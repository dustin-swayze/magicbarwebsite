{% extends 'base.html' %}
{% block title %}Kitchen Menu | Magic Bar{% endblock %}

{% block content %}
<section class="kitchen-menu-page">
  <h2 class="kitchen-menu-title">Kitchen Menu</h2>

  {% if active_menu and active_menu.pdf %}
    <div class="menu-embed-wrapper">
      <a
        class="menu-open-btn"
        href="{{ active_menu.pdf.url }}"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open Full Menu PDF
      </a>

      <div class="pdf-embed desktop-only">
        <iframe
          src="{{ active_menu.pdf.url }}#view=FitH"
          title="{{ active_menu.title }}"
          loading="lazy">
        </iframe>
      </div>
    </div>
  {% else %}
    <p class="menu-empty">Kitchen menu coming soon.</p>
  {% endif %}
</section>

<style>
  .kitchen-menu-page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
  }

  .kitchen-menu-title {
    margin: 0 0 14px;
    text-align: center;
  }

  .menu-open-btn {
    display: inline-block;
    width: 100%;
    margin: 0 0 12px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 2px solid rgba(255,79,178,0.20);
    background: rgba(255,255,255,0.55);
    box-shadow: 0 10px 22px rgba(0,0,0,0.10);
    font-weight: 900;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    color: inherit;
  }

  .pdf-embed {
    width: 100%;
    height: 85vh;
    min-height: 900px;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(63,69,81,0.16);
    background: rgba(255,255,255,0.15);
  }

  .pdf-embed iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }

  .menu-empty {
    text-align: center;
    padding: 24px;
  }

  @media (max-width: 768px) {
    .desktop-only {
      display: none;
    }

    .menu-open-btn {
      display: block;
      margin-bottom: 0;
    }
  }
</style>
{% endblock %}
