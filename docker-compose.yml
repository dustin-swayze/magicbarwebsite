
services:
  web:
    build: ./backend
    container_name: magicbar_backend
    volumes:
      - ./backend:/app
      # this is for production server
      - /var/www/magicbar/media:/app/media
      #this path is for local server
      # - ./media:/app/media
      - ./data/db.sqlite3:/app/db.sqlite3

    ports:
      - "8000:8000"
    env_file:
      - .env
